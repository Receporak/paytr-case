services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: paytr_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - supervisor_logs:/var/log/supervisor
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - paytr_net

  nginx:
    image: nginx:1.27-alpine
    container_name: paytr_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9000}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - paytr_net

  postgres:
    image: postgres:16-alpine
    container_name: paytr_postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT_EXTERNAL:-5434}:5432"
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-paytr} -d ${DB_DATABASE:-paytr_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paytr_net

  redis:
    image: redis:7-alpine
    container_name: paytr_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_EXTERNAL:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paytr_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  supervisor_logs:
    driver: local

networks:
  paytr_net:
    driver: bridge
